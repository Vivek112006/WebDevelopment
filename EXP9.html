<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration</title>
</head>

<body style="font-family: Arial; background-color:#e3f2fd;">

<div style="width:40%; margin:auto; background:white; padding:30px; margin-top:40px; border-radius:10px; box-shadow:0px 0px 10px gray;">

    <h2 style="text-align:center; color:#1565c0;">Employee Registration Form</h2>

    <form style="text-align:center;">

        <label>First Name:</label><br>
        <input type="text" placeholder="Enter First Name" style="width:80%; padding:8px; margin:8px;"><br>

        <label>Last Name:</label><br>
        <input type="text" placeholder="Enter Last Name" style="width:80%; padding:8px; margin:8px;"><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter Email" style="width:80%; padding:8px; margin:8px;"><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter Phone Number" style="width:80%; padding:8px; margin:8px;"><br>

        <label>Gender:</label><br>
        <div style="margin:8px;">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </div>

        <label>Department:</label><br>
        <select style="width:84%; padding:8px; margin:8px;">
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Marketing</option>
        </select><br>

        <label>Skills:</label><br>
        <div style="margin:8px;">
            <input type="checkbox"> Communication
            <input type="checkbox"> Programming
            <input type="checkbox"> Management
        </div>

        <label>Address:</label><br>
        <textarea rows="3" style="width:80%; padding:8px; margin:8px;"></textarea><br>

        <label>Date of Joining:</label><br>
        <input type="date" style="width:80%; padding:8px; margin:8px;"><br><br>

        <input type="submit" value="Register" style="background:#1565c0; color:white; padding:10px 20px; border:none; border-radius:5px;">

        <input type="reset" value="Clear" style="padding:10px 20px; margin-left:10px; border-radius:5px;">

    </form>

</div>

</body>
</html>
